name: "CI Build"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: https://github.com/DecentSoftware-eu/DecentHolograms
  BRANCH: main
  MAX_COMMITS: 10

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CI Repo
        uses: actions/checkout@v6
      - name: Check for GitHub CLI
        run: gh --version
      - name: Get latest Upstream commit SHA
        id: upstream
        run: |
          SHA=$(git ls-remote "$UPSTREAM_REPO" "refs/heads/$BRANCH" | cut -f1)

          echo "sha=$SHA" >> $GITHUB_OUTPUT

          echo "Latest Upstream SHA: $SHA"
      - name: Get latest SHA from latest CI release
        id: previous
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh release view --json body -q .body 2>/dev/null || true)

          LAST_SHA=$(echo "$BODY" | grep '^UPSTREAM_SHA=' | cut -d= -f2)

          echo "last_sha=$LAST_SHA" >> $GITHUB_OUTPUT

          echo "Last Build SHA: $LAST_SHA"
      - name: Stop if nothing changed
        id: check
        run: |
          if [[ "${{ steps.upstream.outputs.sha }}" = "${{ steps.previous.outputs.last_sha }}" ]]; then
            echo "No upstream changes found."
            echo "continue=false" >> $GITHUB_OUTPUT
          else
            echo "continue=true" >> $GITHUB_OUTPUT
          fi
      - name: Clone upstream repository
        if: steps.check.outputs.continue == 'true'
        run: git clone --branch "$BRANCH" "$UPSTREAM_REPO" upstream
      - name: Setup Java
        if: steps.check.outputs.continue == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Make Gradle exectuable
        if: steps.check.outputs.continue == 'true'
        working-directory: upstream
        run: chmod +x gradlew
      - name: Build Jar
        if: steps.check.outputs.continue == 'true'
        working-directory: upstream
        run: ./gradlew shadowJar -x test
      - name: Find build artifacts
        if: steps.check.outputs.continue == 'true'
        id: artifact
        run: |
          FILE=$(find upstream/plugin/build/libs \
            -maxdepth 1 \
            -type f \
            \( -name "DecentHolograms*.jar" -o -name "*.war" \) \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No Build artifact found!"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

          echo "Build Artifact: $FILE"
      - name: Determine next build number
        if: steps.check.outputs.continue == 'true'
        id: version
        run: |
          LAST=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")

          if [[ -z "$LAST" ]]; then
            NEXT=1
          else
            NEXT=$((LAST + 1))
          fi

          echo "next=$NEXT" >> $GITHUB_OUTPUT

          echo "Next Build Number: $NEXT"
      - name: Generate Changelog
        if: steps.check.outputs.continue == 'true'
        id: changelog
        shell: bash
        working-directory: upstream
        run: |
          set -eo pipefail
          
          OLD_SHA="${{ steps.previous.outputs.last_sha }}"
          NEW_SHA="${{ steps.upstream.outputs.sha }}"

          if [[ -z "$OLD_SHA" ]]; then
            echo "First build!"

            TOTAL=$(git rev-list --count HEAD)

            LOG=$(git log \
              -n "$MAX_COMMITS" \
              --pretty=format:'- [\`%h\`](${UPSTREAM_REPO}/commit/%H) %s - %an')
          else
            TOTAL=$(git rev-list --count "${OLD_SHA}..${NEW_SHA}")
            
            LOG=$(git log \
              "${OLD_SHA}..${NEW_SHA}" \
              -n "$MAX_COMMITS" \
              --pretty=format:'- [\`%h\`](${UPSTREAM_REPO}/commit/%H) %s - %an')
          fi

          if [[ "$TOTAL" -gt "$MAX_COMMITS" ]]; then
            OMITTED=$((TOTAL - MAX_COMMITS))
            LOG="${LOG}"$'\n'"- ...and ${OMITTED} more."
          fi

          echo "Generated Changelog:"
          echo "$LOG"

          printf 'logs<<EOF\n%s\nEOF\n' "$LOG" >> $GITHUB_OUTPUT
      - name: Create release
        if: steps.check.outputs.continue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release_notes.txt << EOF
          Automated Upstream Build

          ## Changes

          ${{ steps.changelog.outputs.logs }}

          ## Metadata

          UPSTREAM_SHA=${{ steps.upstream.outputs.sha }}
          EOF

          gh release create "${{ steps.version.outputs.next }}" \
            "${{ steps.artifact.outputs.file }}" \
            --title "Build ${{ steps.version.outputs.next }}" \
            --notes-file release_notes.txt
